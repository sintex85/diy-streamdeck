name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pyserial Pillow

      - name: Build exe
        run: |
          pyinstaller --onedir --name "StreamDeck" --noconsole --clean --noconfirm ^
            --hidden-import serial.tools.list_ports ^
            --hidden-import serial.tools.list_ports_common ^
            --hidden-import serial.tools.list_ports_windows ^
            --hidden-import PIL ^
            streamdeck_app.py
        shell: cmd

      - name: Create launcher
        run: |
          echo @echo off > "dist/StreamDeck/Stream Deck.bat"
          echo cd /d "%%~dp0" >> "dist/StreamDeck/Stream Deck.bat"
          echo start "" StreamDeck.exe >> "dist/StreamDeck/Stream Deck.bat"
        shell: cmd

      - name: Create auto-start installer
        run: |
          echo @echo off > "dist/StreamDeck/Instalar Auto-Arranque.bat"
          echo cd /d "%%~dp0" >> "dist/StreamDeck/Instalar Auto-Arranque.bat"
          echo StreamDeck.exe --install >> "dist/StreamDeck/Instalar Auto-Arranque.bat"
          echo pause >> "dist/StreamDeck/Instalar Auto-Arranque.bat"
        shell: cmd

      - name: Zip
        run: Compress-Archive -Path dist/StreamDeck -DestinationPath StreamDeck-Windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: StreamDeck-Windows
          path: StreamDeck-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pyserial Pillow pyobjc-framework-Quartz

      - name: Build app
        run: |
          pyinstaller --onedir --name "StreamDeck" --clean --noconfirm \
            --hidden-import serial.tools.list_ports \
            --hidden-import serial.tools.list_ports_common \
            --hidden-import serial.tools.list_ports_posix \
            --hidden-import PIL \
            --hidden-import Quartz \
            --hidden-import objc \
            streamdeck_app.py

      - name: Create launcher script
        run: |
          cat > "dist/StreamDeck/Stream Deck.command" << 'SCRIPT'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./StreamDeck
          SCRIPT
          chmod +x "dist/StreamDeck/Stream Deck.command"
          chmod +x "dist/StreamDeck/StreamDeck"

      - name: Create auto-start installer
        run: |
          cat > "dist/StreamDeck/Instalar Auto-Arranque.command" << 'SCRIPT'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./StreamDeck --install
          echo ""
          echo "Auto-arranque instalado!"
          read -p "Pulsa Enter para cerrar..."
          SCRIPT
          chmod +x "dist/StreamDeck/Instalar Auto-Arranque.command"

      - name: Zip
        run: cd dist && zip -r ../StreamDeck-Mac.zip StreamDeck/

      - uses: actions/upload-artifact@v4
        with:
          name: StreamDeck-Mac
          path: StreamDeck-Mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            StreamDeck-Windows/StreamDeck-Windows.zip
            StreamDeck-Mac/StreamDeck-Mac.zip
          body: |
            ## DIY Stream Deck

            ### Descarga
            - **Windows**: `StreamDeck-Windows.zip` - Extrae y ejecuta `Stream Deck.bat`
            - **Mac**: `StreamDeck-Mac.zip` - Extrae y ejecuta `Stream Deck.command`

            ### Primera vez
            1. Descarga el ZIP de tu sistema
            2. Extrae la carpeta
            3. Ejecuta "Stream Deck" - se abrira el navegador
            4. Para auto-arranque ejecuta "Instalar Auto-Arranque"

            ### Driver USB
            Si el ESP32 no se detecta, instala el driver CH340:
            - [Windows](https://www.wch.cn/downloads/CH341SER_EXE.html)
            - [Mac](https://www.wch.cn/downloads/CH341SER_MAC_ZIP.html)
